name: Build macOS artifact

on:
  workflow_dispatch:
    inputs:
      arch:
        description: macOS architecture
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64

permissions:
  contents: read

concurrency:
  group: macos-artifact-${{ github.ref }}-${{ inputs.arch }}
  cancel-in-progress: false

jobs:
  build:
    name: macOS ${{ inputs.arch }} DMG
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true

      - name: Install
        run: vp install --frozen-lockfile

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp run test

      - name: Build desktop
        run: vp run build:desktop

      - name: Smoke test desktop
        run: vp run test:desktop-smoke

      - name: Package DMG
        run: vp run dist:desktop:dmg:${{ inputs.arch }} --skip-build --verbose

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: Ethereal-macOS-${{ inputs.arch }}
          path: release/Ethereal-*.dmg
          if-no-files-found: error
          retention-days: 14
